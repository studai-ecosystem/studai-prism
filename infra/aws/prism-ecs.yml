AWSTemplateFormatVersion: '2010-09-09'
Description: StudAI Prism production service on ECS Fargate with EFS and a dedicated ALB.

Parameters:
  ImageUri:
    Type: String
    Description: Immutable ECR image URI including tag.
  RuntimeSecretArn:
    Type: String
    Description: ARN of the AWS Secrets Manager JSON runtime configuration.
  Hostname:
    Type: CommaDelimitedList
    Description: Public hostnames routed by the shared production ALB (first entry is canonical).
    Default: prism.studai.one,prism-aws.studai.one
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-019b712076f7e2a78
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-02d20668e6b7cdbce,subnet-01256399d95a5fcf0,subnet-03f9a7d1ac4bb416a
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-08949060caabbf860,subnet-0cff629a4935cae36,subnet-0689252746acbd12d
  CertificateArn:
    Type: String
    Default: arn:aws:acm:ap-south-1:158346964832:certificate/eec35e1a-807c-4a03-8c9c-0e983b2caee2
  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 1

Resources:
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: studai-prism-prod
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Application
          Value: studai-prism
        - Key: Environment
          Value: production

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: studai-prism-prod-execution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Application
          Value: studai-prism

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: studai-prism-prod-task
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PrismRuntimeLeastPrivilege
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadRuntimeConfiguration
                Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref RuntimeSecretArn
              - Sid: InvokeApprovedInRegionModels
                Effect: Allow
                Action: bedrock:InvokeModel
                Resource:
                  - arn:aws:bedrock:ap-south-1::foundation-model/mistral.mistral-large-3-675b-instruct
                  - arn:aws:bedrock:ap-south-1::foundation-model/mistral.ministral-3-14b-instruct
                  - arn:aws:bedrock:ap-south-1::foundation-model/mistral.voxtral-mini-3b-2507
                  - arn:aws:bedrock:ap-south-1::foundation-model/amazon.titan-embed-text-v2:0
              - Sid: InvokeApprovedGlobalProfiles
                Effect: Allow
                Action: bedrock:InvokeModel
                Resource:
                  - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/global.anthropic.claude-sonnet-5
                  - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/global.amazon.nova-2-lite-v1:0
                  - arn:aws:bedrock:*::foundation-model/anthropic.claude-sonnet-5
                  - arn:aws:bedrock:*::foundation-model/amazon.nova-2-lite-v1:0
              - Sid: SynthesizeAuthorizedPersonaLines
                Effect: Allow
                Action: polly:SynthesizeSpeech
                Resource: '*'
              - Sid: MountPrismData
                Effect: Allow
                Action:
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientWrite
                Resource: !Sub arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${FileSystem}
                Condition:
                  StringEquals:
                    elasticfilesystem:AccessPointArn: !Sub arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:access-point/${AccessPoint}
      Tags:
        - Key: Application
          Value: studai-prism

  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow the Prism ALB to reach Prism tasks.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      Tags:
        - Key: Name
          Value: studai-prism-prod-tasks
        - Key: Application
          Value: studai-prism

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow Prism tasks to mount the Prism EFS filesystem.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref TaskSecurityGroup
      Tags:
        - Key: Name
          Value: studai-prism-prod-efs
        - Key: Application
          Value: studai-prism

  FileSystem:
    Type: AWS::EFS::FileSystem
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BackupPolicy:
        Status: ENABLED
      Encrypted: true
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
        - TransitionToPrimaryStorageClass: AFTER_1_ACCESS
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: studai-prism-prod-data
        - Key: Application
          Value: studai-prism

  AccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref FileSystem
      PosixUser:
        Uid: '1000'
        Gid: '1000'
      RootDirectory:
        Path: /prism
        CreationInfo:
          OwnerUid: '1000'
          OwnerGid: '1000'
          Permissions: '0770'
      AccessPointTags:
        - Key: Name
          Value: studai-prism-prod

  MountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Select [0, !Ref PrivateSubnetIds]
      SecurityGroups: [!Ref EfsSecurityGroup]

  MountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Select [1, !Ref PrivateSubnetIds]
      SecurityGroups: [!Ref EfsSecurityGroup]

  MountTargetC:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Select [2, !Ref PrivateSubnetIds]
      SecurityGroups: [!Ref EfsSecurityGroup]

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: 3001
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckEnabled: true
      HealthCheckPath: /api/health
      HealthCheckPort: traffic-port
      HealthCheckProtocol: HTTP
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
      Tags:
        - Key: Application
          Value: studai-prism

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public HTTP/HTTPS ingress for the Prism ALB.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from the internet.
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP for redirects to HTTPS.
      Tags:
        - Key: Name
          Value: studai-prism-alb
        - Key: Application
          Value: studai-prism

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: studai-prism-alb
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      Subnets: !Ref PublicSubnetIds
      SecurityGroups: [!Ref AlbSecurityGroup]
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: '120'
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'
      Tags:
        - Key: Application
          Value: studai-prism
        - Key: Environment
          Value: production

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            Host: '#{host}'
            Path: '/#{path}'
            Query: '#{query}'
            StatusCode: HTTP_301

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: studai-prism-prod
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      Volumes:
        - Name: prism-data
          EFSVolumeConfiguration:
            FilesystemId: !Ref FileSystem
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId: !Ref AccessPoint
              IAM: ENABLED
      ContainerDefinitions:
        - Name: prism
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 3001
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: '3001'
            - Name: AWS_SECRETS_MANAGER_SECRET_ID
              Value: !Ref RuntimeSecretArn
            - Name: AWS_SECRETS_MANAGER_REGION
              Value: !Ref AWS::Region
            - Name: AWS_SECRETS_MANAGER_REQUIRED
              Value: 'true'
          MountPoints:
            - SourceVolume: prism-data
              ContainerPath: /home/data/prism
              ReadOnly: false
          LinuxParameters:
            InitProcessEnabled: true
          StopTimeout: 30
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/studai-prism-prod
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: prism
      Tags:
        - Key: Application
          Value: studai-prism

  Service:
    Type: AWS::ECS::Service
    DependsOn:
      - HttpsListener
      - HttpListener
      - MountTargetA
      - MountTargetB
      - MountTargetC
    Properties:
      ServiceName: web
      Cluster: !Ref Cluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      PlatformVersion: LATEST
      HealthCheckGracePeriodSeconds: 120
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 0
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      LoadBalancers:
        - ContainerName: prism
          ContainerPort: 3001
          TargetGroupArn: !Ref TargetGroup
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups: [!Ref TaskSecurityGroup]
          Subnets: !Ref PrivateSubnetIds
      EnableECSManagedTags: true
      PropagateTags: SERVICE
      Tags:
        - Key: Application
          Value: studai-prism
        - Key: Environment
          Value: production

Outputs:
  ClusterName:
    Value: !Ref Cluster
  ServiceName:
    Value: !GetAtt Service.Name
  ServiceUrl:
    Value: !Sub
      - https://${PrimaryHost}
      - PrimaryHost: !Select [0, !Ref Hostname]
  LoadBalancerDNSName:
    Value: !GetAtt LoadBalancer.DNSName
  FileSystemId:
    Value: !Ref FileSystem
  TargetGroupArn:
    Value: !Ref TargetGroup